# Ruff configuration for Qtcord
# https://docs.astral.sh/ruff/configuration/

line-length = 120

[lint]
# Only catch real issues, not style nitpicks
select = ["F", "W"]
ignore = ["E501"]

# Auto-generated UI files from Qt Designer should not be linted
exclude = [
    "src/ui/main_ui.py",
    "src/ui/login_ui.py",
    "src/ui/licenses_ui.py",
    "src/ui/no_internet.py",
]

[format]
# Exclude auto-generated files from formatting checks too
exclude = [
    "src/ui/main_ui.py",
    "src/ui/login_ui.py",
    "src/ui/licenses_ui.py",
    "src/ui/no_internet.py",
]
