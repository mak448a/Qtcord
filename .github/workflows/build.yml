name: Build and Release

# This workflow builds and lints the application.
# It uses the built-in GITHUB_TOKEN to release and DOES NOT require any external secrets.

on:
  push:
    tags: [ 'v*' ]
    branches: [ main ]
  pull_request:
    branches: [ '**' ]

jobs:
  get-version:
    name: Get version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set_name.outputs.version }}
    steps:
      - name: Set artifact name
        id: set_name
        run: echo "version=$(python3 src/version.py)" >> $GITHUB_OUTPUT
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    needs: get-version
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build
        run: |
          python helper_scripts/package_windows.py
          mv src/dist/Qtcord-Windows src/dist/Qtcord/Qtcord-${{ needs.get-version.outputs.artifact_name }}-Windows

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Qtcord-Windows
          path: src/dist/Qtcord-${{ needs.get-version.outputs.artifact_name }}-Windows
          if-no-files-found: error

  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    needs: get-version
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build
        run: python3 helper_scripts/package_mac.py

      - name: Prepare artifact
        run: |
          mkdir -p src/dist/Qtcord-${{ needs.get-version.outputs.artifact_name }}-macOS
          mv src/dist/Qtcord-macOS.app src/dist/Qtcord-${{ needs.get-version.outputs.artifact_name }}-macOS/

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Qtcord-macOS
          path: src/dist/Qtcord-${{ needs.get-version.outputs.artifact_name }}-macOS
          if-no-files-found: error

  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    needs: get-version
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build
        run: |
          pyinstaller helper_scripts/linux.spec
          mv dist/Qtcord-Linux dist/Qtcord-${{ needs.get-version.outputs.artifact_name }}-Linux

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Qtcord-Linux
          path: dist/Qtcord-${{ needs.get-version.outputs.artifact_name }}-Linux
          if-no-files-found: error

  release:
    name: Create Release
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts

      - name: Package release assets
        run: |
          cd artifacts
          zip -r ../Qtcord-${{ needs.get-version.outputs.artifact_name }}-Windows.zip Qtcord-${{ needs.get-version.outputs.artifact_name }}-Windows/
          zip -r ../Qtcord-${{ needs.get-version.outputs.artifact_name }}-macOS.zip Qtcord-macOS/
          zip -r ../Qtcord-${{ needs.get-version.outputs.artifact_name }}-Linux.zip Qtcord-${{ needs.get-version.outputs.artifact_name }}-Linux/

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            Qtcord-${{ needs.get-version.outputs.artifact_name }}-Windows.zip
            Qtcord-${{ needs.get-version.outputs.artifact_name }}-macOS.zip
            Qtcord-${{ needs.get-version.outputs.artifact_name }}-Linux.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
