name: Build and Release

# This workflow builds and lints the application.
# It uses the built-in GITHUB_TOKEN to release and DOES NOT require any external secrets.

on:
  push:
    tags: [ 'v*' ]
    branches: [ main ]
  pull_request:
    branches: [ '**' ]

jobs:
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build
        run: python helper_scripts/package_windows.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: Qtcord-Windows
          path: src/dist/Qtcord-Windows
          if-no-files-found: error

  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build
        run: python3 helper_scripts/package_mac.py

      - name: Prepare artifact
        run: |
          mkdir -p src/dist/Qtcord-macOS
          mv src/dist/Qtcord-macOS.app src/dist/Qtcord-macOS/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Qtcord-macOS
          path: src/dist/Qtcord-macOS
          if-no-files-found: error

  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build
        run: |
          pyinstaller helper_scripts/linux.spec

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: Qtcord-Linux
          path: dist/Qtcord-Linux
          if-no-files-found: error

  release:
    name: Create Release
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package release assets
        run: |
          cd artifacts
          zip -r ../Qtcord-Windows.zip Qtcord-Windows/
          zip -r ../Qtcord-macOS.zip Qtcord-macOS/
          cd ..
          cp artifacts/Qtcord-Linux/Qtcord-Linux .
          chmod +x Qtcord-Linux

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            Qtcord-Windows.zip
            Qtcord-macOS.zip
            Qtcord-Linux
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
